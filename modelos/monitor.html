<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CRT Monitor</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <!-- ✅ MAPA DE IMPORTAÇÃO (ESSENCIAL) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
      "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js"
    }
  }
  </script>
</head>

<body>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

// Cena
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// Câmera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(1.5, 1, 2);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Controles
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Luz
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(2,2,2);
scene.add(light);

// =======================
// CRT
// =======================

const group = new THREE.Group();

// Corpo
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.9, 1.2),
  new THREE.MeshStandardMaterial({ color: 0xdcdcdc })
);
group.add(body);

// Tela curva
const geo = new THREE.PlaneGeometry(0.7, 0.5, 20, 20);
const pos = geo.attributes.position;

for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i);
  const y = pos.getY(i);
  pos.setZ(i, -(x*x + y*y) * 0.4);
}

const screen = new THREE.Mesh(
  geo,
  new THREE.MeshStandardMaterial({
    color: 0x222244,
    emissive: 0x111133
  })
);

screen.position.set(0, 0.05, 0.61);
group.add(screen);

// Moldura
const frame = new THREE.Mesh(
  new THREE.BoxGeometry(0.85, 0.65, 0.05),
  new THREE.MeshStandardMaterial({ color: 0xbfbfbf })
);
frame.position.set(0, 0.05, 0.58);
group.add(frame);

// Base
const base = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.1, 0.4),
  new THREE.MeshStandardMaterial({ color: 0xdcdcdc })
);
base.position.set(0, -0.55, 0);
group.add(base);

// Botões
for (let i = 0; i < 4; i++) {
  const btn = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 0.02, 16),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
  );
  btn.rotation.x = Math.PI / 2;
  btn.position.set(-0.15 + i * 0.1, -0.25, 0.62);
  group.add(btn);
}

scene.add(group);

// Loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
